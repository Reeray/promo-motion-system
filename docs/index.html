<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Promo Motion System — reference library</title>
    <!-- No Google Fonts <link> on purpose. It made the PREVIEW more forgiving than the RENDER:
         a headless render has no page CSS, so a block that forgot to import the loader still
         looked right here and came out serif in the MP4. Fonts now come only from
         src/lib/fonts.ts (@remotion/google-fonts), which both paths share. -->
    <script>
      // set theme before paint to avoid flash
      (function () {
        try {
          var t = localStorage.getItem('pms-theme');
          if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" crossorigin href="./assets/index-CRenvrWz.css">
  </head>
